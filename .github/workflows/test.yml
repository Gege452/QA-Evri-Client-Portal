name: EVRi Client Portal CI
on:
  push:
    branch:
       - 'main'
  pull_request:
     branches:
       - 'main'

jobs:
# Run application tests first, then run security tests and dependency scan in parallel
   application-tests:
      name: Application Tests
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.9'
            cache: pip

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Run application tests
          run: pytest test/  -v

   owasp-security-tests:
    name: OWASP Security Tests
    runs-on: ubuntu-latest
    needs: application-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OWASP mapped security tests
        run: pytest tests/test_owasp_security.py -v

   dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: application-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency vulnerability scan
        run: pip-audit
