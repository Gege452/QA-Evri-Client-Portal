<h2 class="wizard-heading">Client Details</h2>

<form method="POST" action="{{ url_for('admin.admin_create_client', step=1) }}" class="wizard-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="wizard-form-row">
        <label for="client_name">Client Name*</label>
        <input
            type="text"
            id="client_name"
            name="client_name"
            value="{{ form_data.get('client_name', '') }}"
            placeholder="e.g. ABC Company"
            maxlength="120"
            required
        >
    </div>

    <div class="wizard-form-row">
        <label for="phone_number">Phone Number*</label>
        <input
            type="text"
            id="phone_number"
            name="phone_number"
            value="{{ form_data.get('phone_number', '') }}"
            placeholder="07123456789"
            maxlength="30"
            required
        >
    </div>

    <div class="wizard-form-row">
        <label for="email">Email address*</label>
        <input
            type="email"
            id="email"
            name="email"
            value="{{ form_data.get('email', '') }}"
            placeholder="e.g. mybusiness@business.com"
            maxlength="120"
            required
        >
    </div>

    <div class="wizard-actions">
        <a href="{{ url_for('admin.admin_clients') }}" class="btn-secondary">Back</a>
        <button type="submit" class="btn-primary">Save and Continue</button>
    </div>

</form>
